name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3am UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node build.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Package release assets
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          cd public
          tar -czf ../deadwater-site-$(date +%Y%m%d).tar.gz .
          cp citations/deadwater-publications.bib ../deadwater-publications.bib
          cp citations/deadwater-publications.ris ../deadwater-publications.ris
          cp datasets/publications-2024.csv ../deadwater-dataset.csv
          cp datasets/publications-2024.json ../deadwater-dataset.json
      - name: Upload release artifacts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            deadwater-site-*.tar.gz
            deadwater-publications.bib
            deadwater-publications.ris
            deadwater-dataset.csv
            deadwater-dataset.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate release notes
        run: |
          node -e "
          let seed = Date.now() % 100000;
          function rng() { seed = seed || 1; seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }
          function pick(a) { return a[Math.floor(rng() * a.length) % a.length]; }
          const DOMAINS = ['Distributed Systems','Neural Architecture','Quantum-Adjacent Computing','Emergent Computation','Topological Data Analysis','Causal Inference','Federated Learning','Homomorphic Processing','Graph Neural Networks','Reinforcement Dynamics','Probabilistic Programming','Formal Verification'];
          const ADJ = ['Scalable','Robust','Efficient','Novel','Adaptive','Hierarchical','Compositional','Generalized','Unified','Invariant'];
          const NOUNS = ['Framework','Architecture','Methodology','Paradigm','Algorithm','Mechanism','Representation','Embedding','Objective','Estimator'];
          const FIRST = ['Chen','Anika','Marcus','Yuki','Priya','Oliver','Sofia','Rahul','Elena','James','Mei','Fatima'];
          const LAST = ['Wei','Patel','Johansson','Nakamura','Okafor','Reeves','Petrov','Gupta','Torres','Kim'];
          function title() { return pick(ADJ)+' '+pick(NOUNS)+'s for '+pick(DOMAINS); }
          function author() { return pick(FIRST)+' '+pick(LAST); }
          function sentence() { return 'We propose a '+pick(ADJ).toLowerCase()+' '+pick(NOUNS).toLowerCase()+' that achieves state-of-the-art results on '+pick(DOMAINS).toLowerCase()+' benchmarks with a '+(10+rng()*40).toFixed(1)+'% improvement over prior methods.'; }
          const d = new Date();
          const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          let md = '## Deadwater Research Digest — '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+'\n\n';
          md += 'This edition highlights recent publications across '+pick(DOMAINS).toLowerCase()+', '+pick(DOMAINS).toLowerCase()+', and '+pick(DOMAINS).toLowerCase()+'.\n\n';
          md += '### Research Highlights\n\n';
          for (let i = 0; i < 5; i++) {
            md += '**'+title()+'**\\\n';
            md += author()+', '+author()+', '+author()+'\\\n';
            md += sentence()+' '+sentence()+'\n\n';
          }
          md += '### Updated Datasets\n\n';
          md += '- \`deadwater-dataset.csv\` — 1,000 publication records with metadata\n';
          md += '- \`deadwater-dataset.json\` — 500 publications with full abstracts and metrics\n';
          md += '- \`deadwater-publications.bib\` — 500 BibTeX citations\n';
          md += '- \`deadwater-publications.ris\` — 500 RIS citations\n\n';
          md += '### Site Statistics\n\n';
          md += '- '+Math.floor(2400+rng()*200)+' article pages generated\n';
          md += '- '+Math.floor(rng()*50+10)+' new publications indexed\n';
          md += '- Search index updated across all '+DOMAINS.length+'+ domains\n';
          process.stdout.write(md);
          " > release_notes.md
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="digest-$(date +%Y%m%d)"
          gh release create "$TAG" \
            --title "Research Digest — $(date +'%B %d, %Y')" \
            --notes-file release_notes.md \
            deadwater-site-*.tar.gz \
            deadwater-publications.bib \
            deadwater-publications.ris \
            deadwater-dataset.csv \
            deadwater-dataset.json
