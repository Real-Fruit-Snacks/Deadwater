<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: deep sky to deep blue -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="40%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="50%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0284c7" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#0284c7" opacity="0.04"/>

    <!-- === LOGOMARK: Still Surface Grid === -->

    <!-- Flat horizontal surface line -->
    <line x1="44" y1="56" x2="116" y2="56" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>

    <!-- Still water above - subtle atmosphere -->
    <line x1="52" y1="50" x2="108" y2="50" stroke="#0284c7" stroke-width="0.3" opacity="0.15"/>
    <line x1="60" y1="44" x2="100" y2="44" stroke="#0284c7" stroke-width="0.2" opacity="0.1"/>

    <!-- Structured grid pattern below surface -->
    <!-- Row 1 -->
    <circle cx="56" cy="66" r="1.3" fill="#0284c7" opacity="0.5"/>
    <circle cx="66" cy="66" r="1.3" fill="#2563eb" opacity="0.45"/>
    <circle cx="76" cy="66" r="1.3" fill="#0284c7" opacity="0.5"/>
    <circle cx="86" cy="66" r="1.3" fill="#2563eb" opacity="0.45"/>
    <circle cx="96" cy="66" r="1.3" fill="#0284c7" opacity="0.5"/>
    <circle cx="106" cy="66" r="1.3" fill="#2563eb" opacity="0.45"/>

    <!-- Row 2 -->
    <circle cx="56" cy="76" r="1.3" fill="#2563eb" opacity="0.4"/>
    <circle cx="66" cy="76" r="1.3" fill="#0284c7" opacity="0.4"/>
    <circle cx="76" cy="76" r="1.3" fill="#2563eb" opacity="0.45"/>
    <circle cx="86" cy="76" r="1.3" fill="#0284c7" opacity="0.4"/>
    <circle cx="96" cy="76" r="1.3" fill="#2563eb" opacity="0.4"/>
    <circle cx="106" cy="76" r="1.3" fill="#0284c7" opacity="0.4"/>

    <!-- Row 3 -->
    <circle cx="56" cy="86" r="1.3" fill="#0284c7" opacity="0.35"/>
    <circle cx="66" cy="86" r="1.3" fill="#2563eb" opacity="0.35"/>
    <circle cx="76" cy="86" r="1.3" fill="#0284c7" opacity="0.35"/>
    <circle cx="86" cy="86" r="1.3" fill="#2563eb" opacity="0.35"/>
    <circle cx="96" cy="86" r="1.3" fill="#0284c7" opacity="0.35"/>
    <circle cx="106" cy="86" r="1.3" fill="#2563eb" opacity="0.35"/>

    <!-- Row 4 -->
    <circle cx="56" cy="96" r="1.3" fill="#2563eb" opacity="0.25"/>
    <circle cx="66" cy="96" r="1.3" fill="#0284c7" opacity="0.25"/>
    <circle cx="76" cy="96" r="1.3" fill="#2563eb" opacity="0.3"/>
    <circle cx="86" cy="96" r="1.3" fill="#0284c7" opacity="0.25"/>
    <circle cx="96" cy="96" r="1.3" fill="#2563eb" opacity="0.25"/>
    <circle cx="106" cy="96" r="1.3" fill="#0284c7" opacity="0.25"/>

    <!-- Faint vertical grid lines -->
    <line x1="56" y1="60" x2="56" y2="100" stroke="#0284c7" stroke-width="0.3" opacity="0.1"/>
    <line x1="66" y1="60" x2="66" y2="100" stroke="#2563eb" stroke-width="0.3" opacity="0.1"/>
    <line x1="76" y1="60" x2="76" y2="100" stroke="#0284c7" stroke-width="0.3" opacity="0.1"/>
    <line x1="86" y1="60" x2="86" y2="100" stroke="#2563eb" stroke-width="0.3" opacity="0.1"/>
    <line x1="96" y1="60" x2="96" y2="100" stroke="#0284c7" stroke-width="0.3" opacity="0.1"/>
    <line x1="106" y1="60" x2="106" y2="100" stroke="#2563eb" stroke-width="0.3" opacity="0.1"/>

    <!-- Faint horizontal grid lines -->
    <line x1="52" y1="66" x2="110" y2="66" stroke="#0284c7" stroke-width="0.2" opacity="0.08"/>
    <line x1="52" y1="76" x2="110" y2="76" stroke="#2563eb" stroke-width="0.2" opacity="0.08"/>
    <line x1="52" y1="86" x2="110" y2="86" stroke="#0284c7" stroke-width="0.2" opacity="0.08"/>
    <line x1="52" y1="96" x2="110" y2="96" stroke="#2563eb" stroke-width="0.2" opacity="0.08"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#0284c7" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#2563eb" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "DEADWATER" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="10"
        fill="url(#g1)" text-anchor="middle">DEADWATER</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">RESEARCH PUBLICATION PLATFORM</text>

  <!-- Descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">GO  ·  TYPESCRIPT  ·  SEARCH  ·  API</text>
</svg>
